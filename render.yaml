services:
  - type: web
    name: benyjoe-bac
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://backend-x2n5.onrender.com/api/v1

  - type: web
    name: backend
    env: docker
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: orientation-db
          property: connectionString
