version: "3.9"

services:

  api:
    build: .
    container_name: orientation_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://orientation:orientation123@postgres/orientation_dz
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=change-me-in-production-use-openssl-rand-hex-32
      - DEBUG=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  worker:
    build: .
    container_name: orientation_worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://orientation:orientation123@postgres/orientation_dz
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    command: celery -A app.tasks worker --loglevel=info
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: orientation_postgres
    environment:
      POSTGRES_USER: orientation
      POSTGRES_PASSWORD: orientation123
      POSTGRES_DB: orientation_dz
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orientation -d orientation_dz"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: orientation_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: orientation_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
